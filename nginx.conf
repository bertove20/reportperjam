# ══════════════════════════════════════════
# Nginx Config — Report Bot SaaS Ecosystem
#
# Nginx serve: static files (HTML, JS, CSS)
# Fastify serve: API only (/api/*)
#
# Copy ke VPS:
#   cp nginx.conf /etc/nginx/sites-available/reportperjam
#   ln -sf /etc/nginx/sites-available/reportperjam /etc/nginx/sites-enabled/
#   nginx -t && systemctl restart nginx
# ══════════════════════════════════════════

# Block direct IP access
server {
    listen 80 default_server;
    listen 443 ssl default_server;
    server_name _;
    ssl_certificate /etc/nginx/cf-origin-cert.pem;
    ssl_certificate_key /etc/nginx/cf-origin-key.pem;
    return 444;
}

# HTTP → redirect (jika Cloudflare Full SSL)
server {
    listen 80;
    server_name report.grup138.com *.report.grup138.com;

    # Serve static langsung
    root /var/www/html/reportperjam/admin/dist;

    # API → proxy ke Fastify
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        client_max_body_size 10M;
    }

    # Static assets (JS, CSS, images) — cache 1 tahun (immutable hash)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Favicon
    location = /favicon.svg {
        try_files $uri =404;
    }
    location = /favicon.ico {
        try_files $uri =404;
    }

    # SPA fallback — semua route lain → index.html (no cache)
    location / {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        try_files $uri /index.html;
    }
}

# HTTPS (untuk Cloudflare Full SSL)
server {
    listen 443 ssl;
    server_name report.grup138.com *.report.grup138.com;

    ssl_certificate /etc/nginx/cf-origin-cert.pem;
    ssl_certificate_key /etc/nginx/cf-origin-key.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    root /var/www/html/reportperjam/admin/dist;

    # API → proxy ke Fastify
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        client_max_body_size 10M;
    }

    # Static assets — cache forever (filename has hash)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Favicon
    location = /favicon.svg { try_files $uri =404; }
    location = /favicon.ico { try_files $uri =404; }

    # SPA fallback — no cache on HTML
    location / {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        try_files $uri /index.html;
    }
}
